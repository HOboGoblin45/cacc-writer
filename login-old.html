<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1117" />
  <title>Appraisal Agent — Sign In</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23e2b714'/><text x='50' y='68' text-anchor='middle' font-size='52' font-weight='900' fill='%23111' font-family='system-ui'>AA</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --bg-elevated: #11161d;
      --line: rgba(230, 237, 243, 0.09);
      --line-strong: rgba(230, 237, 243, 0.16);
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #e2b714;
      --accent-soft: rgba(226, 183, 20, 0.14);
      --danger: #f85149;
      --success: #3fb950;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      background:
        radial-gradient(circle at top left, rgba(226, 183, 20, 0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(88, 166, 255, 0.06), transparent 22%),
        var(--bg);
      color: var(--text);
    }

    .auth-shell {
      width: min(440px, calc(100vw - 32px));
      padding: 40px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .brand-mark {
      width: 52px; height: 52px;
      display: grid; place-items: center;
      border-radius: 16px;
      color: #111; font-weight: 900; font-size: 1.1rem;
      background: linear-gradient(135deg, #e2b714, #f5d54f);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .brand h1 { font-size: 1.3rem; }
    .brand p { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }

    .tabs {
      display: flex; gap: 4px;
      margin-bottom: 24px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 4px;
      background: rgba(255,255,255,0.02);
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border: 0; border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-weight: 600; font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .tab.active {
      background: var(--accent-soft);
      color: var(--text);
      border: 1px solid rgba(226,183,20,0.35);
    }

    .form-group {
      display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 16px;
    }

    label { color: var(--muted); font-size: 0.82rem; font-weight: 600; }

    input {
      padding: 12px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    input:focus {
      border-color: rgba(226,183,20,0.7);
      box-shadow: 0 0 0 4px rgba(226,183,20,0.12);
    }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border: 0; border-radius: 999px;
      background: linear-gradient(135deg, #e2b714, #f5d54f);
      color: #111; font-weight: 700; font-size: 1rem;
      cursor: pointer;
      transition: transform 0.18s;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      padding: 12px;
      margin-top: 12px;
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 12px;
      background: rgba(248,81,73,0.08);
      color: #ffd6d6;
      font-size: 0.88rem;
      display: none;
    }

    .success-msg {
      padding: 12px;
      margin-top: 12px;
      border: 1px solid rgba(63,185,80,0.3);
      border-radius: 12px;
      background: rgba(63,185,80,0.08);
      color: #d3f9d8;
      font-size: 0.88rem;
      display: none;
    }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-shell">
    <div class="brand">
      <div class="brand-mark">AA</div>
      <div>
        <h1>Appraisal Agent</h1>
        <p>AI-powered narrative drafting</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="login">Sign In</button>
      <button class="tab" data-tab="register">Create Account</button>
    </div>

    <div class="form-panel active" id="panel-login">
      <form id="login-form">
        <div class="form-group">
          <label for="login-username">Email or username</label>
          <input id="login-username" type="text" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" required autocomplete="current-password" />
        </div>
        <button class="btn" type="submit">Sign in</button>
      </form>
      <div class="error-msg" id="login-error"></div>
    </div>

    <div class="form-panel" id="panel-register">
      <form id="register-form">
        <div class="form-group">
          <label for="reg-name">Display name</label>
          <input id="reg-name" type="text" required placeholder="Charles Cresci" />
        </div>
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input id="reg-username" type="text" required autocomplete="username" minlength="3" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" required autocomplete="new-password" minlength="8" />
        </div>
        <button class="btn" type="submit">Create account</button>
      </form>
      <div class="error-msg" id="register-error"></div>
      <div class="success-msg" id="register-success"></div>
    </div>

    <div class="footer">
      Cresci Appraisal &amp; Consulting &middot; <a href="/">Back to app</a>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('.btn');
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch(API + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('login-username').value,
            password: document.getElementById('login-password').value,
          })
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('aa-token', data.token);
        localStorage.setItem('aa-user', JSON.stringify(data.user));
        window.location.href = '/';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });

    // Register
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('.btn');
      const errEl = document.getElementById('register-error');
      const successEl = document.getElementById('register-success');
      errEl.style.display = 'none';
      successEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res = await fetch(API + '/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            displayName: document.getElementById('reg-name').value,
            username: document.getElementById('reg-username').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value,
          })
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'Registration failed');
        successEl.textContent = 'Account created! Switching to sign in…';
        successEl.style.display = 'block';
        setTimeout(() => {
          document.querySelector('[data-tab="login"]').click();
          document.getElementById('login-username').value = document.getElementById('reg-username').value;
          document.getElementById('login-password').focus();
        }, 1500);
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('aa-token')) {
      window.location.href = '/';
    }
  </script>
</body>
</html>
