<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Appraisal Agent</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%23e2b714'/><text x='50' y='68' text-anchor='middle' font-size='52' font-weight='900' fill='%23111' font-family='system-ui'>AA</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #001A0F; --bg-card: #002916; --border: rgba(0,168,107,0.18);
      --text: #F5F5F7; --text-muted: rgba(245,245,247,0.55);
      --accent: #00A86B; --accent-hover: #00c07a; --danger: #f85149; --radius: 10px;
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      padding: 40px 36px; width: 100%; max-width: 420px; }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .brand-mark { width: 40px; height: 40px; background: #e2b714; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: #111; }
    .brand-copy strong { display: block; font-size: 15px; font-weight: 700; }
    .brand-copy span { font-size: 12px; color: var(--text-muted); }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px; font-family: inherit; font-size: 14px;
      color: var(--text); outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: rgba(245,245,247,0.3); }
    .error-msg { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3);
      border-radius: var(--radius); color: #f85149; font-size: 13px; padding: 10px 14px;
      margin-bottom: 16px; display: none; }
    .error-msg.visible { display: block; }
    .success-msg { background: rgba(0,168,107,0.1); border: 1px solid rgba(0,168,107,0.3);
      border-radius: var(--radius); color: var(--accent); font-size: 13px; padding: 10px 14px;
      margin-bottom: 16px; display: none; }
    .success-msg.visible { display: block; }
    button[type="submit"] { width: 100%; background: var(--accent); color: #001A0F; border: none;
      border-radius: var(--radius); padding: 11px; font-family: inherit; font-size: 14px;
      font-weight: 700; cursor: pointer; margin-top: 8px; transition: background 0.15s, opacity 0.15s; }
    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
    .footer-link { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 20px; }
    .footer-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }
    .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark">AA</div>
      <div class="brand-copy">
        <strong>Appraisal Agent</strong>
        <span>Cresci Appraisal &amp; Consulting</span>
      </div>
    </div>
    <h1>Create your account</h1>
    <p class="subtitle">Start generating USPAP-compliant narratives in minutes.</p>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
    <form id="signup-form">
      <div class="field">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" placeholder="appraiser123" required minlength="3" />
        <p class="hint">At least 3 characters</p>
      </div>
      <div class="field">
        <label for="firm">Firm name <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <input id="firm" name="firm" type="text" placeholder="Your appraisal firm" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="••••••••" required minlength="8" />
        <p class="hint">At least 8 characters</p>
      </div>
      <div class="field">
        <label for="confirm-password">Confirm password</label>
        <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" placeholder="••••••••" required />
      </div>
      <button type="submit" id="submit-btn">Create account</button>
    </form>
    <p class="footer-link">Already have an account? <a href="/login">Sign in</a></p>
  </div>
  <script>
    const form = document.getElementById('signup-form');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const submitBtn = document.getElementById('submit-btn');

    function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('visible'); successMsg.classList.remove('visible'); }
    function showSuccess(msg) { successMsg.textContent = msg; successMsg.classList.add('visible'); errorMsg.classList.remove('visible'); }
    function hideMessages() { errorMsg.classList.remove('visible'); successMsg.classList.remove('visible'); }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const firm = document.getElementById('firm').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      // Client-side validation
      if (!email.includes('@') || !email.includes('.')) { showError('Please enter a valid email address.'); return; }
      if (username.length < 3) { showError('Username must be at least 3 characters.'); return; }
      if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
      if (password !== confirmPassword) { showError('Passwords do not match.'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, username, password, displayName: firm || username }),
        });
        const data = await res.json();
        if (!res.ok || data.error) {
          showError(data.error || 'Registration failed. Please try again.');
          return;
        }

        // Auto-login after registration
        const loginRes = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const loginData = await loginRes.json();
        if (loginRes.ok && loginData.token) {
          sessionStorage.setItem('cacc_token', loginData.token);
          sessionStorage.setItem('cacc_user', JSON.stringify(loginData.user));
          window.location.href = '/app';
        } else {
          showSuccess('Account created! Redirecting to login...');
          setTimeout(() => { window.location.href = '/login'; }, 1500);
        }
      } catch (err) {
        showError('Network error — is the server running?');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
