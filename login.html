<span class="material-symbols-outlined absolute right-0 top-3 text-on-secondary-container/40 text-sm">alternate_email</span>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">

<a class="text-[0.65rem] font-label text-primary hover:text-primary-fixed transition-colors tracking-[0.05em] uppercase" href="#">Forgot Password?</a>
</div>

<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-on-secondary-container/30 transition-all duration-300 py-3 px-0" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-0 top-3 text-on-secondary-container/40 text-sm">lock</span>
</div>

<!-- Primary Action -->

<button class="w-full aureate-gradient h-12 rounded-full text-on-primary font-bold tracking-tight hover:shadow-[0_0_25px_rgba(0, 168, 107, 0.4)] transition-all duration-300 active:scale-[0.98]" type="submit">

<!-- Divider -->

<div class="h-[1px] flex-1 bg-outline-variant/20"></div>

                    Continue with Google

<a class="font-['Inter'] text-[0.75rem] font-semibold uppercase tracking-[0.08em] text-[#b0b9c4] hover:text-[#dfe2eb] transition-opacity duration-300" href="#">Privacy Policy</a>
</div>

<script>
// ── Appraisal Agent — Login/Register API Integration ────────────────────────
const API = window.location.origin + '/api';

// Redirect if already logged in
if (localStorage.getItem('aa-token')) window.location.href = '/dashboard';

const form = document.querySelector('form');
let isLoginMode = true;

// Tab references
let signInTab = null, createTab = null;
document.querySelectorAll('button').forEach(btn => {
  const t = btn.textContent.trim().toLowerCase();
  if (t === 'sign in') signInTab = btn;
  if (t === 'create account') createTab = btn;
});

function switchToLogin() {
  isLoginMode = true;
  signInTab?.classList.add('border-primary', 'text-on-surface');
  signInTab?.classList.remove('border-transparent', 'text-on-secondary-container');
  createTab?.classList.remove('border-primary', 'text-on-surface');
  createTab?.classList.add('border-transparent', 'text-on-secondary-container');
  document.querySelectorAll('[data-reg]').forEach(el => el.remove());
  const submitBtn = form?.querySelector('button[type="submit"]');
  if (submitBtn) submitBtn.textContent = 'Sign In';
  const usernameInput = form?.querySelector('input[type="text"]');
  if (usernameInput) usernameInput.placeholder = 'Email or Username';
}

function switchToRegister() {
  isLoginMode = false;
  createTab?.classList.add('border-primary', 'text-on-surface');
  createTab?.classList.remove('border-transparent', 'text-on-secondary-container');
  signInTab?.classList.remove('border-primary', 'text-on-surface');
  signInTab?.classList.add('border-transparent', 'text-on-secondary-container');

  if (!document.querySelector('[data-reg]') && form) {
    const firstField = form.querySelector('.space-y-2');
    const nameField = document.createElement('div');
    nameField.className = 'space-y-2'; nameField.setAttribute('data-reg', 'true');
    nameField.innerHTML = `<label class="block text-[0.65rem] font-label text-on-secondary-container tracking-[0.1em] uppercase">Full Name</label>
      <div class="relative"><input id="reg-name" class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-on-secondary-container/30 transition-all duration-300 py-3 px-0" placeholder="Charles Cresci" type="text" required /></div>`;
    firstField?.before(nameField);

    const emailField = document.createElement('div');
    emailField.className = 'space-y-2'; emailField.setAttribute('data-reg', 'true');
    emailField.innerHTML = `<label class="block text-[0.65rem] font-label text-on-secondary-container tracking-[0.1em] uppercase">Email Address</label>
      <div class="relative"><input id="reg-email" class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-on-surface placeholder:text-on-secondary-container/30 transition-all duration-300 py-3 px-0" placeholder="you@cresciappraisal.com" type="email" required /></div>`;
    firstField?.before(emailField);

    const usernameInput = form.querySelector('input[type="text"]:not([id])');
    if (usernameInput) usernameInput.placeholder = 'Username (for login)';
  }

  const submitBtn = form?.querySelector('button[type="submit"]');
  if (submitBtn) submitBtn.textContent = 'Create Account';
}

if (signInTab) signInTab.onclick = switchToLogin;
if (createTab) createTab.onclick = switchToRegister;

function showError(msg) {
  let errEl = document.getElementById('auth-error');
  if (!errEl) {
    errEl = document.createElement('div');
    errEl.id = 'auth-error';
    errEl.className = 'p-3 rounded-lg bg-[#93000a]/20 border border-[#ffb4ab]/20 text-[#ffb4ab] text-xs font-semibold text-center';
    form?.insertBefore(errEl, form.querySelector('button[type="submit"]'));
  }
  errEl.textContent = msg;
  errEl.style.display = 'block';
}

function clearError() {
  const errEl = document.getElementById('auth-error');
  if (errEl) errEl.style.display = 'none';
}

if (form) {
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    const submitBtn = form.querySelector('button[type="submit"]');
    const origText = submitBtn?.textContent || 'Sign In';
    submitBtn.disabled = true;

    try {
      if (isLoginMode) {
        const usernameInput = form.querySelector('input[type="text"]:not([id])') || form.querySelector('input[type="text"]');
        const passwordInput = form.querySelector('input[type="password"]');
        const username = usernameInput?.value?.trim();
        const password = passwordInput?.value;
        if (!username || !password) { showError('Please enter your username and password.'); return; }

        submitBtn.textContent = 'Signing in...';
        const res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'Login failed. Check your credentials.');
        localStorage.setItem('aa-token', data.token);
        localStorage.setItem('aa-user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } else {
        const displayName = document.getElementById('reg-name')?.value?.trim();
        const email = document.getElementById('reg-email')?.value?.trim();
        const usernameInput = form.querySelector('input[type="text"]:not([id="reg-name"]):not([id="reg-email"])') || form.querySelector('input[type="text"]');
        const passwordInput = form.querySelector('input[type="password"]');
        const username = usernameInput?.value?.trim();
        const password = passwordInput?.value;

        if (!displayName || !email || !username || !password) { showError('All fields are required.'); return; }
        if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

        submitBtn.textContent = 'Creating account...';
        const res = await fetch(API + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ displayName, email, username, password }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'Registration failed.');
        localStorage.setItem('aa-token', data.token);
        localStorage.setItem('aa-user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      }
    } catch (err) {
      showError(err.message);
    } finally {
      if (submitBtn && submitBtn.disabled) {
        submitBtn.textContent = origText;
        submitBtn.disabled = false;
      }
    }
  });
}

console.log('Login page loaded — Appraisal Agent');
</script>
