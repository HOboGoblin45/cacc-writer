server {
    server_name appraisal-agent.com www.appraisal-agent.com;
    client_max_body_size 50M;

    # API endpoints need longer timeouts for AI generation
    location /api/ {
        proxy_pass http://127.0.0.1:5178;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://127.0.0.1:5178;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/appraisal-agent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appraisal-agent.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.appraisal-agent.com) {
        return 301 https://$host$request_uri;
    }
    if ($host = appraisal-agent.com) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name appraisal-agent.com www.appraisal-agent.com;
    return 404;
}
